name: CI - Run UI Tests

env:
  DOTNET_VERSION: '10.0.x'
  # Use the repository workspace to store test results so the folder is created on the runner
  TEST_RESULTS_DIR: "${{ github.workspace }}\\TestResults"
  # Opt into Node.js 24 for javascript actions to avoid Node.js 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v2
      with:
        chrome-version: '146'

    - name: Restore dependencies
      run: dotnet restore

    - name: Ensure TestResults directory exists
      run: |
        if (-not (Test-Path -Path "$env:TEST_RESULTS_DIR")) { New-Item -ItemType Directory -Path "$env:TEST_RESULTS_DIR" -Force | Out-Null }
      shell: powershell

    - name: Run tests
      env:
        TEST_RESULTS_DIR: ${{ env.TEST_RESULTS_DIR }}
      run: |
        dotnet test --logger "console;verbosity=detailed" --results-directory "$env:TEST_RESULTS_DIR" --logger "trx;LogFileName=test_results.trx"
      shell: powershell

    - name: List TestResults directory
      if: always()
      run: |
        Write-Host "Test results dir: $env:TEST_RESULTS_DIR"
        if (Test-Path -Path "$env:TEST_RESULTS_DIR") { Get-ChildItem -Path "$env:TEST_RESULTS_DIR" -Recurse | ForEach-Object { Write-Host $_.FullName } } else { Write-Host "Test results dir not found" }
      shell: powershell

    - name: Upload TestResults
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: TestResults
        path: ${{ env.TEST_RESULTS_DIR }}
