name: CI - Run UI Tests

env:
  DOTNET_VERSION: '10.0.x'
  TEST_RESULTS_DIR: 'D:\\ParaBank_ParaSoft_Automation\\ParabankParasoftAutomation\\TestResults'

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: '146'

    - name: Restore dependencies
      run: dotnet restore

    - name: Ensure TestResults directory exists
      if: runner.os == 'Windows'
      run: |
        if (-not (Test-Path -Path "$env:TEST_RESULTS_DIR")) { New-Item -ItemType Directory -Path "$env:TEST_RESULTS_DIR" -Force | Out-Null }
      shell: powershell
    - name: Ensure TestResults directory exists (Linux/macOS fallback)
      if: runner.os != 'Windows'
      run: mkdir -p "$TEST_RESULTS_DIR"
      shell: bash

    - name: Run tests
      env:
        TEST_RESULTS_DIR: ${{ env.TEST_RESULTS_DIR }}
      run: dotnet test --logger "console;verbosity=detailed" --results-directory "$env:TEST_RESULTS_DIR" --logger "trx;LogFileName=test_results.trx"

    - name: Upload TestResults
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TestResults
        path: ${{ env.TEST_RESULTS_DIR }}
